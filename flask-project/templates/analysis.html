<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>分析・シミュレーション結果</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="report-container">
<h1>家 計 分 析 レ ポ ー ト</h1>

</div>
<div class="single-chart-wrapper" style="width: 95%; margin: 0 auto;">
<h2>① 過去の支出推移</h2>
<div class="summary-text">月ごとの支出合計の推移です。</div>

<div class="canvas-container" style="position: relative; height: 500px; width: 100%;">
    <canvas id="expenseLineChart"></canvas>
</div>
</div>

</div>
</div>


<div class="analysis-section" style="margin-top: 100px; clear: both;">
  <h2>② AIによる詳細分析</h2>

  <div class="metrics-grid">
    <div class="metrics-card">
      <span class="metric-label">平均月間支出</span>
      <span id="avg_expense_display" class="metric-value">{{avg_expense_display }}</span></div>
    
      <div class="metrics-card">
  <span class="metric-label">前月比</span>
  <span class="metrics-value {% if monthly_ratio|default(0) <= 0 %}status-up{% else %}status-down{% endif %}">
    
    {# 記号の出し分け #}
    {% if monthly_ratio|default(0) <= 0 %}
      ▲
    {% else %}
      ▼
    {% endif %}
    
    {# 数値の表示 #}
    {{ (monthly_ratio|default(0))|abs }}%
  </span>
</div>
    <div class="metrics-card">
      <span class="metric-label">年間節約総額</span>
      <span class="metric-value">{{ annual_savings|default(0)|int }}円</span></div>
  </div>


  <div class="analysis-card">
    <h3>支出傾向のアドバイス</h3>

    <p class="analysis-text">
      {{ advice }}
    </p>
  </div>
  <div class="no-print" style="text-align: center; margin-top: 40px; margin-bottom: 40px 0;">
  <button onclick="window.print();" class="pdf-button">
    このレポートをPDFで保存する
  </button>

</div>

</div>

<style>
body {
  background-color: lightcyan;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
  width: 100%;
  box-sizing: border-box;
}

.chart-container {
  display: block;
  width: 100%;
  max-width: 0 auto;
  text-align: center;
}


.canvas-container {
  position: relative;
  height: 600px;
  width: 100%;
  margin-bottom: 60px;
}

.report-container h1 {
  color: plum;
  text-align: center;
  font-size: 50px;
}

.report-container {
  width: 100%;
  max-width: none;
}

h2 {
  color: chocolate;
}

.summary-text {
  color: peru;
}

.analysis-section {
  width: 95%;
  max-width: 1600px;
  margin-top: 80px;
  clear: both;
}

/*メトリクス（数字）の横並び */
.metrics-grid {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.metrics-card {
  flex: 1;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.metric-label {
  display: block;
  color: peru;
  font-size: 16px;
  margin-bottom: 8px;                              
  font-weight: 600;
}

.metric-value {
  font-size: 24px;
  font-weight: bold;
  color: gray;
  display: block;
  margin-top: 5px;
}

/* 支出が減った（良い傾向）ときの色 */
.status-down {
  color: green;
  font-size: 25px;
}

.status-up {
  color: red;
  font-size: 25px;
}
/* 分析カード */
.analysis-card {
    padding: 30px;
    border-radius: 20px;
    border-left: 10px solid plum;
}

.analysis-card h3 {
  color: pink;
  margin-top: 0;
}

.analysis-text {
   line-height: 2.0;
   font-size: 18px;
   color: #444;
}

.metric-card, .analysis-card {
  background-color: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.analysis-section h2 {
  color: pink;
}

.pdf-button {
  background-color: plum;
  color: white;
  padding: 15px 40px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0,1);
  transition: transform 0.3s ease;
}

.pdf-button:hover {
  transform: transformY(-2px);
  background-color: hotpink;
  box-shadow:  0 6px 20px rgba(0,0,0,0.15);
}

/* 印刷・PDF保存時の設定 */
@media print {
  /* 保存ボタンなどはPDFに含めない */
  .no-print, .pdf-button{
      display: none !important;
  }

  /* 背景色をPDFにも反映させるための設定 */
  body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;

    background-color: lightcyan !important;
  }

  /* グラフやカードなどの要素も色を維持する */
    * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

  /* グラフが途中で切れないように調整 */
  .canvas-container {
    page-break-inside: avoid;
  }
}
/* 印刷時にはExcelボタンも隠す */
@media print {
    .excel-button {
        display: none !important;
    }
}
  </style>

<script>
  // 1. まず、サーバー（Python）からデータを受け取る
    const chartLabels = {{ labels|safe}};
    const chartTotals = {{ totals|safe}};
    const foodData = {{ foods|safe}};
    const transportData = {{ transports|safe}};
    const hobbyData = {{ hobbies|safe}};
    const otherData = {{ others|safe}};

    // 2. まとめておくと使いやすいです（任意）
    const chartDataFromServer = {
        labels: chartLabels,
        totals: chartTotals,
        foods: foodData,
        transports: transportData,
        hobbies: hobbyData,
        others: otherData
    };
</script>

<script src="{{ url_for('static', filename='script_analysis.js') }}"></script>

</body>
</html>
